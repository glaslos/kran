# Example: run kran beside your stack. Mount the host Docker socket so kran can
# list/pull/recreate containers on this machine.
#
#   docker compose -f docker-compose.example.yaml up -d
#
# Use --label-enable and label workloads with kran.enable=true, or omit
# --label-enable to watch every running container (see README).

services:
  kran:
    container_name: kran
    build: .
    image: ghcr.io/glaslos/kran:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro # host timezone
      - ${HOME}/.docker/config.json:/root/.docker/config.json:ro
      # Optional: mount a YAML/JSON config (set KRAN_CONFIG or pass --config).
      # - ./kran.yaml:/etc/kran/kran.yaml:ro
    environment:
      KRAN_INTERVAL: 5m
      # KRAN_CONFIG: /etc/kran/kran.yaml
      # KRAN_LABEL_ENABLE: "1"
      # KRAN_HTTP_ADDR: ":9090"   # /healthz and /metrics (expose only if needed)
    # ports:
    #   - "9090:9090"
    command:
      - "--label-enable"
      - "--self-name=kran"
